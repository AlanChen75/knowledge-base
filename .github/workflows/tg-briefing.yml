name: Send TG Briefing

on:
  push:
    branches: [main]
    paths:
      - 'compiled/daily-briefing.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Read briefing content
          CONTENT=$(cat compiled/daily-briefing.md)

          # Escape Telegram Markdown special chars
          ESCAPED=$(echo "$CONTENT" | sed 's/[_*\[`]/\\&/g')

          # Truncate if > 4000 chars
          if [ ${#ESCAPED} -gt 4000 ]; then
            ESCAPED="${ESCAPED:0:3990}..."
          fi

          # Send
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${ESCAPED}"
